name: Bug report
description: Report a bug in guardrail-rs
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened, and what did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Reproduction
      description: Minimal `guardrail.toml` snippet and request payload that reproduces the issue.
      render: toml
    validations:
      required: false

  - type: input
    id: version
    attributes:
      label: guardrail-rs version
      placeholder: "0.1.1 (or commit SHA)"
    validations:
      required: true

  - type: dropdown
    id: features
    attributes:
      label: Build features
      multiple: true
      options:
        - default
        - onnx
        - onnx-cuda
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: OS / platform
      placeholder: "Ubuntu 22.04, x86_64"
    validations:
      required: true
