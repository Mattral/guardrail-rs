name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Format ─────────────────────────────────────────────────────────────────
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  # ── Lint ───────────────────────────────────────────────────────────────────
  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: |
          cargo clippy --workspace --all-targets -- -D warnings

  # ── Tests (nextest) ────────────────────────────────────────────────────────
  test:
    name: test (${{ matrix.os }}, ${{ matrix.toolchain }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Primary: stable on Linux
          - os: ubuntu-latest
            toolchain: stable
          # Cross-platform: stable on macOS (arm64 runner)
          - os: macos-latest
            toolchain: stable
          # Cross-platform: stable on Windows
          - os: windows-latest
            toolchain: stable
          # Beta Rust: catch upcoming breakage early
          - os: ubuntu-latest
            toolchain: beta
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.toolchain }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.os }}-${{ matrix.toolchain }}
      - uses: taiki-e/install-action@nextest
      - name: cargo nextest run (CI profile)
        run: cargo nextest run --workspace --profile ci
      - name: Upload test results (JUnit)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-${{ matrix.os }}-${{ matrix.toolchain }}
          path: target/nextest/ci/junit.xml
          if-no-files-found: ignore
      - name: cargo test --doc
        run: cargo test --workspace --doc

  # ── No-default-features build ──────────────────────────────────────────────
  no-default-features:
    name: build (no-default-features)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo check -p guardrail-core --no-default-features
      - run: cargo check -p guardrail-classifiers --no-default-features

  # ── ONNX feature build ─────────────────────────────────────────────────────
  build-onnx:
    name: build (onnx feature)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: cargo check --features onnx
        run: cargo check --workspace --features onnx

  # ── MSRV ───────────────────────────────────────────────────────────────────
  msrv:
    name: MSRV (1.75)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.75"
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --workspace

  # ── Code coverage ──────────────────────────────────────────────────────────
  coverage:
    name: coverage (tarpaulin → Codecov)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-tarpaulin
        run: cargo install cargo-tarpaulin --locked
      - name: Generate coverage (XML + stdout summary)
        run: |
          set -o pipefail
          cargo tarpaulin \
            --workspace \
            --exclude guardrail-test-suite \
            --out Xml Stdout \
            --output-dir coverage/ \
            --timeout 300 \
            --ignore-tests \
            2>&1 | tee coverage/tarpaulin-stdout.txt
      - name: Enforce ≥ 80% line coverage
        run: |
          # Robustly parse the tarpaulin stdout and enforce threshold.
          python3 - <<'PY'
          import re, sys
          try:
              txt = open('coverage/tarpaulin-stdout.txt', 'r', encoding='utf-8').read()
          except FileNotFoundError:
              print('ERROR: coverage/tarpaulin-stdout.txt not found. cargo-tarpaulin may have failed to run.')
              sys.exit(1)
      
          m = re.search(r'(\d+(?:\.\d+)?)\s*% coverage', txt)
          if not m:
              print('ERROR: Could not find coverage percentage in tarpaulin output. Full output below:\n')
              print(txt)
              sys.exit(1)
      
          pct = float(m.group(1))
          print(f'Measured line coverage: {pct}%')
          if pct < 80.0:
              print(f'Coverage {pct:.1f}% is below the 80% threshold.')
              sys.exit(1)
      
          print(f'Coverage {pct:.1f}% meets the 80% threshold. ✓')
          PY
      - name: Upload to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: coverage/cobertura.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  # ── License & advisory checks ──────────────────────────────────────────────
  deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check

  # ── Internal dependency version-pin drift check ─────────────────────────────
  # Internal `guardrail-* = { path = "..", version = ".." }` dependency
  # requirements (needed for crates.io publishing — see the comment on
  # [workspace.package].version in the root Cargo.toml) must always match
  # the current workspace version. This catches the case where the
  # workspace version was bumped but the per-crate dependency version
  # strings were not, which would otherwise only surface as a publish-time
  # failure on tag push.
  version-pin-check:
    name: internal dependency version-pin consistency
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify all internal path-dependency versions match the workspace version
        run: |
          WORKSPACE_VERSION=$(grep -m1 '^version' Cargo.toml | sed -E 's/.*"([^"]+)".*/\1/')
          echo "Workspace version: ${WORKSPACE_VERSION}"

          MISMATCHES=0
          while IFS= read -r line; do
            FILE="${line%%:*}"
            CONTENT="${line#*:}"
            PIN=$(echo "$CONTENT" | grep -oP 'version\s*=\s*"\K[^"]+')
            if [ "$PIN" != "$WORKSPACE_VERSION" ]; then
              echo "MISMATCH in $FILE: pinned to '$PIN', workspace is '$WORKSPACE_VERSION'"
              echo "  $CONTENT"
              MISMATCHES=$((MISMATCHES + 1))
            fi
          done < <(grep -rn 'path = "\.\./guardrail-' crates/*/Cargo.toml)

          if [ "$MISMATCHES" -gt 0 ]; then
            echo ""
            echo "FAILED: $MISMATCHES internal dependency version pin(s) are out of date."
            echo "Update every 'guardrail-* = { path = \"..\", version = \"X.Y.Z\" }' line"
            echo "under crates/*/Cargo.toml to match [workspace.package].version."
            exit 1
          fi
          echo "All internal dependency version pins match the workspace version."

  # ── Bundled injection-rules drift check ─────────────────────────────────────
  # guardrail-config/src/injection.rules (the default rule set the *proxy*
  # actually loads via ConfigLoader) and
  # guardrail-classifiers/src/rules/injection.rules (loaded by
  # RegexInjectionScanner::default(), used directly when embedding the
  # library and by guardrail-classifiers' own benches/tests) are two
  # physically separate `include_str!` targets in different crates that are
  # supposed to be identical. They previously drifted — the config crate's
  # copy fell back to an 8-pattern subset while the classifiers crate's copy
  # grew to 30+ patterns covering delimiter abuse and harmful-capability
  # elicitation — silently weakening the *default* injection defense for
  # every user running `guardrail run` without a custom `rules_file`. Diffing
  # on every push catches that class of regression immediately instead of
  # relying on someone noticing during a security review.
  injection-rules-sync:
    name: bundled injection-rules files stay in sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Diff the two bundled rule-set files (ignoring comment lines)
        run: |
          A=crates/guardrail-config/src/injection.rules
          B=crates/guardrail-classifiers/src/rules/injection.rules
          grep -v '^\s*#' "$A" | grep -v '^\s*$' > /tmp/a.rules
          grep -v '^\s*#' "$B" | grep -v '^\s*$' > /tmp/b.rules
          if ! diff -u /tmp/a.rules /tmp/b.rules; then
            echo ""
            echo "FAILED: $A and $B have diverged (diff above, comments/blank"
            echo "lines ignored). Update whichever one is stale so both crates"
            echo "ship the same default prompt-injection rule set."
            exit 1
          fi
          echo "$A and $B match."

  # ── Security audit ─────────────────────────────────────────────────────────
  audit:
    name: cargo-audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo install cargo-audit --locked
      - run: cargo audit

  # ── Documentation build ────────────────────────────────────────────────────
  docs:
    name: docs (rustdoc + mdbook)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: cargo doc (no deps)
        run: cargo doc --workspace --no-deps
        env:
          RUSTDOCFLAGS: "-D warnings"
      - name: Install mdBook
        run: cargo install mdbook --locked
      - name: mdbook build
        run: mdbook build
