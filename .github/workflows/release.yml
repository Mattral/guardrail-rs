name: Release
#
# Two distinct trigger modes, gated separately within this file:
#
# 1. Tag push (v*.*.*): the full release pipeline — verify → build
#    cross-platform binaries → build/push Docker image → publish to
#    crates.io → create the GitHub Release. Every job from `build-binaries`
#    onward is gated with `if: startsWith(github.ref, 'refs/tags/v')`.
#
# 2. Push/PR to main: only `verify` and `publish-dry-run` run. This gives
#    fast, repeated feedback that the workspace would actually be
#    publishable (catching a missing `version` on a path dependency, a bad
#    manifest field, etc.) on every change, rather than discovering a
#    publish-blocking problem for the first time on a real tagged release.

on:
  push:
    tags:
      - "v*.*.*"
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write
  packages: write
  # NOTE: id-token: write for crates.io Trusted Publishing is granted at the
  # `publish` job level only (least privilege) — see that job below.

jobs:
  # ── Verify the release commit is clean ──────────────────────────────────────
  verify:
    name: pre-release checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - uses: taiki-e/install-action@nextest
      - run: cargo nextest run --workspace
      - run: cargo test --workspace --doc

  # ── Validate the publish pipeline without actually publishing ───────────────
  #
  # Runs on every push/PR to main (not just tagged releases) so manifest
  # drift — a missing `version` on an internal path dependency, a bad
  # `description`/`license`/`readme` field — is caught immediately for
  # crates with no unpublished-sibling dependencies, rather than discovered
  # for the first time on a real tagged release.
  #
  # IMPORTANT CAVEAT, unverified against a real `cargo publish --dry-run`
  # run (no toolchain was available to test this claim before committing
  # it): `cargo publish --dry-run` packages a crate by stripping its `path`
  # dependency keys and resolving the remainder via `version` requirements
  # against the registry, the same way a real publish does. For
  # `guardrail-classifiers`/`guardrail-config`/`guardrail-proxy`/
  # `guardrail-cli` — every crate here other than `guardrail-core` — that
  # means this dry-run job will almost certainly FAIL until `guardrail-core`
  # (and each crate's other unpublished siblings) have actually been
  # published at least once. If that's what happens here, it is an expected
  # failure mode for a not-yet-published workspace, not evidence the
  # manifests themselves are broken — re-run this job (or just trust the
  # real `publish` job's own per-crate dependency-order waits) once the
  # first real release has gone out and every crate exists on the registry.
  # `guardrail-core` itself has no such sibling dependency and should be a
  # meaningful, trustworthy signal from the very first run.
  publish-dry-run:
    name: dry-run publish (${{ matrix.crate }})
    needs: verify
    runs-on: ubuntu-latest
    continue-on-error: true  # see caveat above — expected to fail pre-first-release for non-core crates
    strategy:
      fail-fast: false
      matrix:
        # Listed in dependency order for readability / easy comparison with
        # the real `publish` job below — order has no effect on this job's
        # own correctness, only on how easy the two are to keep in sync.
        crate:
          - guardrail-core
          - guardrail-classifiers
          - guardrail-config
          - guardrail-proxy
          - guardrail-cli
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: cargo publish --dry-run
        run: cargo publish -p ${{ matrix.crate }} --dry-run

  # ── Build cross-platform binaries ────────────────────────────────────────────
  # Tag-pushes only: this job builds real release artifacts and is expensive
  # across 5 OS/arch targets, so it must not run on every push/PR to main —
  # that's what `publish-dry-run` above is for.
  build-binaries:
    name: build (${{ matrix.target }})
    needs: verify
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive_ext: tar.gz
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            archive_ext: tar.gz
            cross: true
          - os: macos-latest
            target: x86_64-apple-darwin
            archive_ext: tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            archive_ext: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive_ext: zip
            bin_suffix: .exe
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Install cross (for aarch64-linux)
        if: matrix.cross
        run: cargo install cross --locked

      - name: Build (native)
        if: "!matrix.cross"
        run: cargo build --release -p guardrail-cli --target ${{ matrix.target }}

      - name: Build (cross)
        if: matrix.cross
        run: cross build --release -p guardrail-cli --target ${{ matrix.target }}

      - name: Extract version from tag
        id: version
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Package (tar.gz)
        if: matrix.archive_ext == 'tar.gz'
        run: |
          ARTIFACT="guardrail-rs-${{ steps.version.outputs.version }}-${{ matrix.target }}.tar.gz"
          mkdir -p dist
          tar -czf "dist/${ARTIFACT}" \
            -C "target/${{ matrix.target }}/release" \
            guardrail${{ matrix.bin_suffix || '' }} \
            -C "${GITHUB_WORKSPACE}" \
            guardrail.example.toml README.md LICENSE-APACHE LICENSE-MIT
          echo "artifact=${ARTIFACT}" >> "$GITHUB_OUTPUT"
        id: pkg_tar

      - name: Package (zip, Windows)
        if: matrix.archive_ext == 'zip'
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $target  = "${{ matrix.target }}"
          $artifact = "guardrail-rs-${version}-${target}.zip"
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Compress-Archive -Path @(
            "target/$target/release/guardrail.exe",
            "guardrail.example.toml",
            "README.md",
            "LICENSE-APACHE",
            "LICENSE-MIT"
          ) -DestinationPath "dist/$artifact"

      - uses: actions/upload-artifact@v4
        with:
          name: guardrail-rs-${{ matrix.target }}
          path: dist/*

  # ── Build & push multi-arch Docker image ─────────────────────────────────────
  # Tag-pushes only — see note on build-binaries above.
  docker:
    name: Docker image
    needs: verify
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - uses: docker/setup-buildx-action@v3
        with:
          platforms: linux/amd64,linux/arm64

      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Publish to crates.io via Trusted Publishing (OIDC) ───────────────────────
  #
  # crates.io Trusted Publishing exchanges a short-lived GitHub Actions OIDC
  # token for a short-lived crates.io API token at publish time — no
  # long-lived CARGO_REGISTRY_TOKEN secret is stored in the repo. This
  # requires the crates.io "Trusted Publishing" config for each crate to
  # list this repository + workflow file as an authorized publisher
  # (configured once per crate at https://crates.io/crates/<name>/settings).
  #
  # If your crates.io organization has not yet enabled Trusted Publishing for
  # these crate names, fall back to the long-lived-token flow by setting
  # CARGO_REGISTRY_TOKEN as a repository secret and replacing the
  # `rust-lang/crates-io-auth-action` step with a no-op — the rest of the
  # job (cargo publish calls) is unchanged either way.
  publish:
    name: Publish to crates.io
    needs: [build-binaries, docker]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment: crates-io   # GitHub Environment scoping the OIDC trust relationship.
    permissions:
      id-token: write        # Required to mint the OIDC token for Trusted Publishing.
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      # Exchanges this workflow run's GitHub OIDC token for a short-lived
      # crates.io API token and exports it as CARGO_REGISTRY_TOKEN for all
      # subsequent steps in this job.
      - uses: rust-lang/crates-io-auth-action@v1
        id: auth

      # Publish in dependency order (leaves before roots). Each `cargo
      # publish` picks up CARGO_REGISTRY_TOKEN from the auth step above via
      # the job-level environment — no per-step `env:` needed.
      - name: Publish guardrail-core
        run: cargo publish -p guardrail-core
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

      - name: Wait for guardrail-core to be indexed
        run: sleep 20

      - name: Publish guardrail-classifiers
        run: cargo publish -p guardrail-classifiers
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

      - name: Wait for guardrail-classifiers to be indexed
        run: sleep 20

      - name: Publish guardrail-config
        run: cargo publish -p guardrail-config
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

      - name: Wait for guardrail-config to be indexed
        run: sleep 20

      - name: Publish guardrail-proxy
        run: cargo publish -p guardrail-proxy
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

      - name: Wait for guardrail-proxy to be indexed
        run: sleep 20

      - name: Publish guardrail-cli
        run: cargo publish -p guardrail-cli
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

  # ── Create GitHub Release ─────────────────────────────────────────────────────
  github-release:
    name: GitHub Release
    needs: [build-binaries, docker, publish]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate SHA256 checksums
        run: |
          cd dist
          sha256sum * > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/SHA256SUMS.txt
          generate_release_notes: true
          body_path: CHANGELOG.md
