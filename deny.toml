[graph]
targets = []

[licenses]
# cargo-deny fully removed `deny`, `copyleft`, `allow-osi-fsf-free`, and
# `default` from this section (see the migration note linked from the CI
# error: https://github.com/EmbarkStudios/cargo-deny/pull/611) â€” setting any
# of them is now a hard config-validation error, not just a warning.
# Behavior-wise this is a no-op for us: "all licenses denied unless
# explicitly in `allow`" is exactly what our old
# `copyleft = "deny"` + `allow-osi-fsf-free = "neither"` + `default = "deny"`
# combination already enforced, and the explicit `deny` list served no
# purpose under that model even before the removal (anything not in `allow`
# was already denied). So: just the allow-list and confidence-threshold
# remain.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    # Newer ICU4X-family crates (icu_*, zerovec, yoke, tinystr, litemap, ...,
    # transitively pulled in via `idna` -> `url` -> `reqwest`, and
    # `unicode-ident`) moved from Unicode-DFS-2016 to this newer, still
    # OSI-approved license. Keeping both since different dependency
    # versions in the graph use either one.
    "Unicode-3.0",
    "CC0-1.0",
    "MPL-2.0",
    "OpenSSL",
    # webpki-root-certs / webpki-roots (transitively via rustls, and via
    # `onnx`'s `ort` -> `ureq`), a permissive data-only license for the
    # bundled Mozilla root certificate list.
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
wildcards = "deny"
deny = [
    # OpenSSL is banned everywhere in the *runtime* dependency tree; use
    # rustls instead (already the case for reqwest/hyper/tonic here). The
    # `wrappers` exception below allows it ONLY when pulled in transitively
    # by `native-tls`, which under the `onnx`/`onnx-cuda` features is itself
    # only a (build) dependency of `ort-sys` â€” used solely to download the
    # prebuilt ONNX Runtime shared library at compile time. It never links
    # into, or ships inside, the actual guardrail-rs binary, so it doesn't
    # carry the same runtime TLS-stack risk this ban exists to prevent.
    # `cargo tree -e build -i openssl` and `-i openssl-sys` confirm `(build)
    # ort-sys` is the only path either crate is reachable from.
    { crate = "openssl", wrappers = ["native-tls"], reason = "only a (build)-dependency of ort-sys via native-tls/ureq when the onnx feature downloads its prebuilt runtime; never in the shipped binary's runtime TLS stack" },
    { crate = "openssl-sys", wrappers = ["native-tls", "openssl"], reason = "see the openssl entry above" },
]

[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
# NOTE: `vulnerability`, `unsound`, and `notice` were removed from cargo-deny's
# schema (all vulnerability/unsound advisories now unconditionally emit
# errors, and specifying these fields is itself a config error) â€” do not
# re-add them. Ignore a specific advisory via `ignore = ["RUSTSEC-...."]`
# instead.
# `workspace`: only fail on unmaintained advisories for crates that are a
# *direct* dependency of this workspace. Deep transitive unmaintained deps
# (e.g. pulled in by a dev-dependency like `criterion`) are surfaced by
# `cargo audit`'s informational warnings but won't hard-fail this gate.
unmaintained = "workspace"
yanked = "warn"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-git = []
