[graph]
targets = []

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "CC0-1.0",
    "MPL-2.0",
    "OpenSSL",
]
deny = [
    "GPL-2.0",
    "GPL-3.0",
    "LGPL-2.0",
    "LGPL-2.1",
    "LGPL-3.0",
    "AGPL-3.0",
]
copyleft = "deny"
allow-osi-fsf-free = "neither"
default = "deny"
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
wildcards = "deny"
deny = [
    # OpenSSL is banned; use rustls instead
    { name = "openssl" },
    { name = "openssl-sys" },
]

[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
# NOTE: `vulnerability`, `unsound`, and `notice` were removed from cargo-deny's
# schema (all vulnerability/unsound advisories now unconditionally emit
# errors, and specifying these fields is itself a config error) — do not
# re-add them. Ignore a specific advisory via `ignore = ["RUSTSEC-...."]`
# instead.
# `workspace`: only fail on unmaintained advisories for crates that are a
# *direct* dependency of this workspace. Deep transitive unmaintained deps
# (e.g. pulled in by a dev-dependency like `criterion`) are surfaced by
# `cargo audit`'s informational warnings but won't hard-fail this gate.
unmaintained = "workspace"
yanked = "warn"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-git = []
