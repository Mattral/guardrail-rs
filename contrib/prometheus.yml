# Prometheus configuration for the docker-compose example.
#
# Scrapes guardrail-rs's /metrics endpoint, which is served on the same
# address as the proxy itself (server.listen_addr).

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: guardrail-rs
    metrics_path: /metrics
    static_configs:
      - targets: ["guardrail-rs:8080"]
        labels:
          service: guardrail-rs
